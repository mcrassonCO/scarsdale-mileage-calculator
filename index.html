<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scarsdale Schools Mileage Calculator</title>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; /* Best for embedding */
        }
        
        .maroon-gradient {
            background: linear-gradient(135deg, #800000 0%, #4a0000 100%);
        }
        
        .card-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
        }
        
        /* Interactive Web Map: Crop top header card out of view */
        .map-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        
        .map-container iframe {
            position: absolute;
            top: -69px; /* Shims the Google UI header card up and out of sight */
            left: 0;
            width: 100%;
            height: calc(100% + 69px); /* Extends height to compensate for top shift */
            filter: grayscale(0.2) contrast(1.1);
            transition: all 0.5s ease;
            border: 0;
        }
        
        .map-container:hover iframe {
            filter: grayscale(0) contrast(1);
        }

        /* Native animation since Tailwind plugins aren't loaded via standard CDN */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .card-shadow { box-shadow: none; border: 1px solid #e2e8f0; }
            .map-container { min-height: 500px !important; }
            .map-container iframe { filter: grayscale(0) contrast(1); }
        }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SCARSDALE_SCHOOLS = [
            { name: "Edgewood Elementary", address: "1 Roosevelt Place, Scarsdale, NY 10583" },
            { name: "Fox Meadow Elementary", address: "59 Brewster Road, Scarsdale, NY 10583" },
            { name: "Greenacres Elementary", address: "41 Huntington Avenue, Scarsdale, NY 10583" },
            { name: "Heathcote Elementary", address: "26 Palmer Avenue, Scarsdale, NY 10583" },
            { name: "Quaker Ridge Elementary", address: "125 Weaver Street, Scarsdale, NY 10583" },
            { name: "Scarsdale Middle School", address: "134 Mamaroneck Road, Scarsdale, NY 10583" },
            { name: "Scarsdale High School", address: "1057 Post Road, Scarsdale, NY 10583" }
        ];

        const IRS_RATE_2026 = 0.725;

        const App = () => {
            const [form, setForm] = useState({ home: '', schoolIdx: '', destination: '', hasOutboundStop: false, outboundStop: '', hasReturnStop: false, returnStop: '' });
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null);
            const [error, setError] = useState(null);
            const [override, setOverride] = useState({ active: false, miles: '', reason: '' });

            // Generates a dedicated high-fidelity, single-page printable document
            const handlePrint = () => {
                if (!results) return;

                const printWindow = window.open('', '_blank', 'width=1100,height=850');
                if (!printWindow) {
                    setError("Printing was blocked by your browser. Please allow pop-ups for this site to print.");
                    return;
                }

                const school = SCARSDALE_SCHOOLS[form.schoolIdx];
                
                const shortenAddress = (addr) => {
                    if (!addr) return '';
                    const parts = addr.split(',').map(p => p.trim());
                    const filtered = parts.filter(p => {
                        const lower = p.toLowerCase();
                        return !lower.includes('county') && 
                               lower !== 'united states' && 
                               !lower.includes('planning region');
                    });
                    const zip = filtered.find(p => /^\d{5}(-\d{4})?$/.test(p));
                    const mainParts = filtered.slice(0, 3);
                    if (zip && !mainParts.includes(zip)) {
                        return `${mainParts.join(', ')} ${zip}`;
                    }
                    return mainParts.join(', ');
                };
                const finalHomeTotal = override.active && override.miles !== '' ? parseFloat((parseFloat(override.miles) * IRS_RATE_2026).toFixed(2)) : results.home.total;
                const finalSchoolTotal = override.active && override.miles !== '' ? parseFloat((parseFloat(override.miles) * IRS_RATE_2026).toFixed(2)) : results.school.total;
                const finalHomeMiles = override.active && override.miles !== '' ? parseFloat(override.miles) : parseFloat(results.home.miles);
                const finalSchoolMiles = override.active && override.miles !== '' ? parseFloat(override.miles) : parseFloat(results.school.miles);

                const isHomeLesser = finalHomeTotal < finalSchoolTotal;
                const isSchoolLesser = finalSchoolTotal <= finalHomeTotal;

                // Dedicated Print Template designed specifically to fit on ONE page
                printWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Mileage Calculation - ${results.date}</title>
                        <script src="https://cdn.tailwindcss.com"><\/script>
                        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
                        <style>
                            html, body {
                                height: 11.0in;
                                margin: 0;
                                padding: 0;
                                font-family: 'Inter', sans-serif; 
                                -webkit-print-color-adjust: exact; 
                                print-color-adjust: exact; 
                            }
                            @page { 
                                size: letter portrait; 
                                margin: 0; 
                            }
                            .maroon-gradient { 
                                background: linear-gradient(135deg, #800000 0%, #4a0000 100%) !important; 
                                color: white !important; 
                            }
                            .print-card {
                                border: 2px solid #f1f5f9;
                                height: 100%;
                            }
                            .print-card-highlight {
                                border: 2px solid #22c55e !important;
                                background-color: #f0fdf4 !important;
                            }
                            
                            /* High-fidelity cropped container for Print maps */
                            .map-container { 
                                position: relative;
                                overflow: hidden !important; /* Forces clip boundaries */
                                border-top: 1px solid #e2e8f0;
                            }
                            .map-container iframe {
                                position: absolute;
                                top: -69px !important; /* Clips standard Google search card box out of PDF print */
                                left: 0;
                                width: 100%;
                                height: calc(100% + 69px) !important;
                                border: 0;
                            }
                        </style>
                    </head>
                    <body class="bg-white text-slate-900 text-xs">
                        <!-- Strict page containment layout to guarantee single sheet printout -->
                        <div class="max-w-[800px] mx-auto flex flex-col box-border" style="height: 11.0in; padding: 0.5in;">
                            
                            <!-- 1. HEADER & BREATHING ROOM TITLE -->
                            <div class="mb-4">
                                <div class="flex justify-between items-center border-b pb-4 mb-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 maroon-gradient rounded-lg flex items-center justify-center text-white font-black text-lg">S</div>
                                        <div>
                                            <h1 class="text-base font-black text-[#800000] tracking-tighter uppercase leading-none">Scarsdale Schools</h1>
                                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-0.5">Business Office • Mileage Calculator</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest leading-none">IRS Rate</p>
                                        <p class="text-sm font-black text-slate-800">$${IRS_RATE_2026}<span class="text-[10px] text-slate-400">/mi</span></p>
                                        <p class="text-[8px] font-bold text-slate-400 mt-1 uppercase">${results.date}</p>
                                    </div>
                                </div>

                                <div class="mt-2">
                                    <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase italic leading-none">Official Mileage calculation</h2>
                                    <p class="text-slate-400 font-bold uppercase text-[8px] tracking-wider mt-1">Destination: ${results.dest}</p>
                                </div>
                            </div>

                            <!-- 2. STRETCHED MIDDLE CARDS (Flex-grow to fill remaining space) -->
                            <div class="flex gap-4 flex-grow mb-4 w-full" style="display: flex; gap: 1rem;">
                                
                                <!-- Home Origin Card -->
                                <div class="flex flex-col flex-1 rounded-2xl overflow-hidden print-card ${isHomeLesser ? 'print-card-highlight' : ''}">
                                    <div class="p-4 relative flex-shrink-0">
                                        ${isHomeLesser ? `
                                            <div class="absolute top-0 right-4 bg-green-500 text-white text-[7px] font-black uppercase tracking-widest py-0.5 px-2 rounded-b shadow-sm">
                                                Lowest Cost
                                            </div>
                                        ` : ''}
                                        <div class="flex justify-between items-center mb-2 mt-1">
                                            <h3 class="text-sm font-black uppercase tracking-tight ${isHomeLesser ? 'text-green-700' : 'text-slate-800'}">Home Origin</h3>
                                            <div class="text-right">
                                                <span class="text-xl font-black tracking-tighter block ${isHomeLesser ? 'text-green-700' : 'text-slate-900'}">$${finalHomeTotal.toFixed(2)}</span>
                                                <span class="text-[8px] font-black text-slate-400 uppercase tracking-wider">${finalHomeMiles.toFixed(2)} mi roundtrip</span>
                                                ${override.active && override.miles !== '' ? `
                                                    <span style="font-size: 6px; font-weight: 900; text-transform: uppercase; background-color: #fee2e2; color: #991b1b; padding: 2px 4px; border-radius: 2px; display: block; margin-top: 2px;">Adjusted (Map: ${results.home.miles} mi)</span>
                                                ` : ''}
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-2 gap-4 pt-2 border-t border-slate-100 text-[8px] leading-tight">
                                            <!-- Left Column: Outbound -->
                                            <div class="space-y-1.5 border-r border-slate-100 pr-2">
                                                <p class="font-black uppercase tracking-wider text-[#800000] text-[7.5px] mb-1">Outbound Journey</p>
                                                
                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.home.address}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.home.resolvedAddress)}</span>
                                                    </div>
                                                </div>

                                                ${results.hasOutboundStop ? `
                                                <div class="flex items-start gap-1">
                                                    <span class="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.outboundStop}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.outboundResolvedAddress)}</span>
                                                    </div>
                                                </div>
                                                ` : ''}

                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.dest}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.destResolvedAddress)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Right Column: Return -->
                                            <div class="space-y-1.5 pl-2">
                                                <p class="font-black uppercase tracking-wider text-[#800000] text-[7.5px] mb-1">Return Journey</p>

                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.dest}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.destResolvedAddress)}</span>
                                                    </div>
                                                </div>

                                                ${results.hasReturnStop ? `
                                                <div class="flex items-start gap-1">
                                                    <span class="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.returnStop}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.returnResolvedAddress)}</span>
                                                    </div>
                                                </div>
                                                ` : ''}

                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.home.address}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.home.resolvedAddress)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="map-container flex-grow">
                                        <iframe width="100%" height="100%" frameborder="0" src="${results.home.printMap}"></iframe>
                                    </div>
                                </div>

                                <!-- School Origin Card -->
                                <div class="flex flex-col flex-1 rounded-2xl overflow-hidden print-card ${isSchoolLesser ? 'print-card-highlight' : ''}">
                                    <div class="p-4 relative flex-shrink-0">
                                        ${isSchoolLesser ? `
                                            <div class="absolute top-0 right-4 bg-green-500 text-white text-[7px] font-black uppercase tracking-widest py-0.5 px-2 rounded-b shadow-sm">
                                                Lowest Cost
                                            </div>
                                        ` : ''}
                                        <div class="flex justify-between items-center mb-2 mt-1">
                                            <h3 class="text-sm font-black uppercase tracking-tight ${isSchoolLesser ? 'text-green-700' : 'text-slate-800'}">School Origin</h3>
                                            <div class="text-right">
                                                <span class="text-xl font-black tracking-tighter block ${isSchoolLesser ? 'text-green-700' : 'text-slate-900'}">$${finalSchoolTotal.toFixed(2)}</span>
                                                <span class="text-[8px] font-black text-slate-400 uppercase tracking-wider">${finalSchoolMiles.toFixed(2)} mi roundtrip</span>
                                                ${override.active && override.miles !== '' ? `
                                                    <span style="font-size: 6px; font-weight: 900; text-transform: uppercase; background-color: #fee2e2; color: #991b1b; padding: 2px 4px; border-radius: 2px; display: block; margin-top: 2px;">Adjusted (Map: ${results.school.miles} mi)</span>
                                                ` : ''}
                                            </div>
                                        </div>
                                        <div class="grid grid-cols-2 gap-4 pt-2 border-t border-slate-100 text-[8px] leading-tight">
                                            <!-- Left Column: Outbound -->
                                            <div class="space-y-1.5 border-r border-slate-100 pr-2">
                                                <p class="font-black uppercase tracking-wider text-[#800000] text-[7.5px] mb-1">Outbound Journey</p>
                                                
                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.school.name}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.school.resolvedAddress)}</span>
                                                    </div>
                                                </div>

                                                ${results.hasOutboundStop ? `
                                                <div class="flex items-start gap-1">
                                                    <span class="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.outboundStop}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.outboundResolvedAddress)}</span>
                                                    </div>
                                                </div>
                                                ` : ''}

                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.dest}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.destResolvedAddress)}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Right Column: Return -->
                                            <div class="space-y-1.5 pl-2">
                                                <p class="font-black uppercase tracking-wider text-[#800000] text-[7.5px] mb-1">Return Journey</p>

                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.dest}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.destResolvedAddress)}</span>
                                                    </div>
                                                </div>

                                                ${results.hasReturnStop ? `
                                                <div class="flex items-start gap-1">
                                                    <span class="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.returnStop}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.returnResolvedAddress)}</span>
                                                    </div>
                                                </div>
                                                ` : ''}

                                                <div class="flex items-start gap-1">
                                                    <span class="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                    <div class="flex-grow min-w-0">
                                                        <span class="text-slate-700 font-semibold truncate block">${results.school.name}</span>
                                                        <span class="text-slate-400 font-medium italic block text-[7px] leading-none mt-0.5">${shortenAddress(results.school.resolvedAddress)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="map-container flex-grow">
                                        <iframe width="100%" height="100%" frameborder="0" src="${results.school.printMap}"></iframe>
                                    </div>
                                </div>

                            </div>

                            <!-- Consolidated Manual Mileage Override Info Box -->
                            ${override.active && override.miles !== '' ? `
                            <div style="margin-top: 10px; margin-bottom: 10px; padding: 10px; background-color: #fef2f2; border: 1.5px solid #fecaca; border-radius: 12px; font-size: 8px; line-height: 1.3; color: #7f1d1d; page-break-inside: avoid;">
                                <div style="font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-size: 8.5px; border-bottom: 1px solid #fee2e2; padding-bottom: 3px; color: #991b1b; display: flex; align-items: center; gap: 4px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #991b1b;"><polygon points="16 3 21 8 8 21 3 21 3 16 16 3"></polygon></svg>
                                    Manual Mileage Adjustment Details
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 4px;">
                                    <div>
                                        <strong>Actual Driven Miles (Applied):</strong> ${parseFloat(override.miles).toFixed(2)} mi roundtrip
                                    </div>
                                    <div>
                                        <strong>Original Map Calculations:</strong>
                                        <div style="margin-top: 2px;">• Home Origin Map: ${results.home.miles} mi roundtrip</div>
                                        <div>• School Origin Map: ${results.school.miles} mi roundtrip</div>
                                    </div>
                                </div>
                                <div style="margin-top: 6px; padding-top: 4px; border-top: 1px dashed #fecaca;">
                                    <strong>Justification for Detour:</strong> <span style="font-style: italic;">${override.reason || 'Not specified'}</span>
                                </div>
                            </div>
                            ` : ''}

                            <!-- 3. ANCHORED POLICY BOX AND FOOTER -->
                            <div class="mt-auto">
                                <div class="bg-slate-50 border border-slate-150 rounded-xl p-4 text-[9px] text-slate-500 leading-normal mb-4">
                                    <div class="flex items-center gap-2 mb-2">
                                        <div class="w-0.5 h-3 bg-red-800"></div>
                                        <p class="font-black uppercase tracking-wider text-red-600 text-[9px]">Reimbursement Policy Summary</p>
                                    </div>
                                    <p class="mb-0">
                                        Reimbursement is authorized at the current IRS standard mileage rate. Fuel receipts should not be submitted.
                                        Claim is calculated on the <strong>lesser</strong> of roundtrips: Home-to-Destination vs. School-to-Destination.
                                    </p>
                                </div>

                                <div class="text-center pt-2 border-t border-slate-100">
                                    <p class="text-[7px] font-black text-slate-400 uppercase tracking-[0.4em] mb-0">Non Sibi • Scarsdale Union Free School District</p>
                                </div>
                            </div>
                        </div>

                        <!-- Intelligent Map Loading Trigger -->
                        <script>
                            let mapsLoaded = 0;
                            const iframes = Array.from(document.querySelectorAll('iframe'));
                            const totalMaps = iframes.length;

                            function startPrintProcess() {
                                setTimeout(() => {
                                    window.print();
                                    window.close();
                                }, 1200); // 1.2-second delay for internal iframe rendering to paint
                            }

                            if (totalMaps === 0) {
                                startPrintProcess();
                            } else {
                                iframes.forEach(iframe => {
                                    iframe.onload = () => {
                                        mapsLoaded++;
                                        if (mapsLoaded === totalMaps) {
                                            startPrintProcess();
                                        }
                                    };
                                    // Kickstart loading immediately
                                    iframe.src = iframe.src;
                                });

                                // Fallback: If map requests stall, force printing after 5 seconds anyway
                                setTimeout(startPrintProcess, 5000);
                            }
                        <\/script>
                    </body>
                    </html>
                `);
                printWindow.document.close();
            };

            const calculateDistance = async (e) => {
                e.preventDefault();
                if (!form.home || form.schoolIdx === '' || !form.destination || 
                    (form.hasOutboundStop && !form.outboundStop) || 
                    (form.hasReturnStop && !form.returnStop)) {
                    setError("Please complete all fields.");
                    return;
                }
                setLoading(true);
                setError(null);
                setOverride({ active: false, miles: '', reason: '' });

                try {
                    const school = SCARSDALE_SCHOOLS[form.schoolIdx];
                    
                    const getCoords = async (addr) => {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
                        const data = await res.json();
                        if (!data.length) throw new Error("Location not found");
                        return { 
                            lat: parseFloat(data[0].lat), 
                            lon: parseFloat(data[0].lon),
                            resolvedAddress: data[0].display_name
                        };
                    };

                    const promises = [
                        getCoords(form.home),
                        getCoords(school.address),
                        getCoords(form.destination)
                    ];
                    
                    let outboundIdx = -1;
                    let returnIdx = -1;
                    
                    if (form.hasOutboundStop) {
                        outboundIdx = promises.length;
                        promises.push(getCoords(form.outboundStop));
                    }
                    if (form.hasReturnStop) {
                        returnIdx = promises.length;
                        promises.push(getCoords(form.returnStop));
                    }

                    const resolvedCoords = await Promise.all(promises);
                    const hC = resolvedCoords[0];
                    const sC = resolvedCoords[1];
                    const dC = resolvedCoords[2];
                    const outC = outboundIdx !== -1 ? resolvedCoords[outboundIdx] : null;
                    const retC = returnIdx !== -1 ? resolvedCoords[returnIdx] : null;

                    const getRouteMiles = async (coordsArray) => {
                        const path = coordsArray.map(c => `${c.lon},${c.lat}`).join(';');
                        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${path}?overview=false`);
                        const data = await res.json();
                        if (data.code !== 'Ok' || !data.routes || !data.routes.length) {
                            throw new Error("Could not compute route");
                        }
                        return (data.routes[0].distance * 0.000621371);
                    };

                    const homeOutPath = form.hasOutboundStop ? [hC, outC, dC] : [hC, dC];
                    const homeRetPath = form.hasReturnStop ? [dC, retC, hC] : [dC, hC];

                    const schoolOutPath = form.hasOutboundStop ? [sC, outC, dC] : [sC, dC];
                    const schoolRetPath = form.hasReturnStop ? [dC, retC, sC] : [dC, sC];

                    const [hToDMiles, dToHMiles, sToDMiles, dToSMiles] = await Promise.all([
                        getRouteMiles(homeOutPath),
                        getRouteMiles(homeRetPath),
                        getRouteMiles(schoolOutPath),
                        getRouteMiles(schoolRetPath)
                    ]);

                    const hRT = hToDMiles + dToHMiles;
                    const sRT = sToDMiles + dToSMiles;

                    const getMidpoint = (coords) => {
                        const sum = coords.reduce((acc, c) => ({ lat: acc.lat + c.lat, lon: acc.lon + c.lon }), { lat: 0, lon: 0 });
                        return { lat: sum.lat / coords.length, lon: sum.lon / coords.length };
                    };

                    const homeCoords = [hC, dC];
                    if (outC) homeCoords.push(outC);
                    if (retC) homeCoords.push(retC);
                    const homeMid = getMidpoint(homeCoords);

                    const schoolCoords = [sC, dC];
                    if (outC) schoolCoords.push(outC);
                    if (retC) schoolCoords.push(retC);
                    const schoolMid = getMidpoint(schoolCoords);

                    const getZoomLevel = (miles, isPrint = false) => {
                        const offset = isPrint ? 0 : 1;
                        if (miles < 1) return 15 + offset;
                        if (miles < 2.5) return 14 + offset;
                        if (miles < 5) return 13 + offset;
                        if (miles < 10) return 12 + offset;
                        if (miles < 20) return 11 + offset;
                        if (miles < 45) return 10 + offset;
                        if (miles < 90) return 9 + offset;
                        if (miles < 180) return 8 + offset;
                        if (miles < 360) return 7 + offset;
                        return 6 + offset;
                    };

                    const getGoogleDirUrl = (originText, destText, midLat, midLon, oneWayMiles, outText, retText, isPrint = false) => {
                        const zoom = getZoomLevel(oneWayMiles, isPrint);
                        let url = 'https://maps.google.com/maps?';
                        
                        let daddr = '';
                        if (outText) {
                            daddr += `${encodeURIComponent(outText)}+to:`;
                        }
                        daddr += encodeURIComponent(destText);
                        if (retText) {
                            daddr += `+to:${encodeURIComponent(retText)}`;
                        }
                        if (outText || retText) {
                            daddr += `+to:${encodeURIComponent(originText)}`;
                        }

                        url += `saddr=${encodeURIComponent(originText)}&daddr=${daddr}`;
                        url += `&ll=${midLat},${midLon}&z=${zoom}&output=embed`;
                        return url;
                    };

                    const homeMaxLeg = Math.max(hToDMiles, dToHMiles);
                    const schoolMaxLeg = Math.max(sToDMiles, dToSMiles);

                    setResults({
                        date: new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }),
                        hasOutboundStop: form.hasOutboundStop,
                        outboundStop: form.outboundStop,
                        outboundResolvedAddress: outC ? outC.resolvedAddress : null,
                        hasReturnStop: form.hasReturnStop,
                        returnStop: form.returnStop,
                        returnResolvedAddress: retC ? retC.resolvedAddress : null,
                        home: {
                            miles: hRT.toFixed(2),
                            total: parseFloat((hRT * IRS_RATE_2026).toFixed(2)),
                            address: form.home,
                            resolvedAddress: hC.resolvedAddress,
                            map: getGoogleDirUrl(form.home, form.destination, homeMid.lat, homeMid.lon, homeMaxLeg, form.hasOutboundStop ? form.outboundStop : null, form.hasReturnStop ? form.returnStop : null, false),
                            printMap: getGoogleDirUrl(form.home, form.destination, homeMid.lat, homeMid.lon, homeMaxLeg, form.hasOutboundStop ? form.outboundStop : null, form.hasReturnStop ? form.returnStop : null, true)
                        },
                        school: {
                            name: school.name,
                            miles: sRT.toFixed(2),
                            total: parseFloat((sRT * IRS_RATE_2026).toFixed(2)),
                            address: school.address,
                            resolvedAddress: sC.resolvedAddress,
                            map: getGoogleDirUrl(school.address, form.destination, schoolMid.lat, schoolMid.lon, schoolMaxLeg, form.hasOutboundStop ? form.outboundStop : null, form.hasReturnStop ? form.returnStop : null, false),
                            printMap: getGoogleDirUrl(school.address, form.destination, schoolMid.lat, schoolMid.lon, schoolMaxLeg, form.hasOutboundStop ? form.outboundStop : null, form.hasReturnStop ? form.returnStop : null, true)
                        },
                        dest: form.destination,
                        destResolvedAddress: dC.resolvedAddress
                    });
                } catch (err) {
                    setError("Could not verify addresses. Please try to be more specific (e.g., add 'NY' or a zip code).");
                } finally {
                    setLoading(false);
                }
            };

            const finalHomeTotal = results ? (override.active && override.miles !== '' ? parseFloat((parseFloat(override.miles) * IRS_RATE_2026).toFixed(2)) : results.home.total) : 0;
            const finalSchoolTotal = results ? (override.active && override.miles !== '' ? parseFloat((parseFloat(override.miles) * IRS_RATE_2026).toFixed(2)) : results.school.total) : 0;
            const finalHomeMiles = results ? (override.active && override.miles !== '' ? parseFloat(override.miles) : parseFloat(results.home.miles)) : 0;
            const finalSchoolMiles = results ? (override.active && override.miles !== '' ? parseFloat(override.miles) : parseFloat(results.school.miles)) : 0;

            const isHomeLesser = results ? (finalHomeTotal < finalSchoolTotal) : false;
            const isSchoolLesser = results ? (finalSchoolTotal <= finalHomeTotal) : false;

            const shortenAddress = (addr) => {
                if (!addr) return '';
                const parts = addr.split(',').map(p => p.trim());
                const filtered = parts.filter(p => {
                    const lower = p.toLowerCase();
                    return !lower.includes('county') && 
                           lower !== 'united states' && 
                           !lower.includes('planning region');
                });
                const zip = filtered.find(p => /^\d{5}(-\d{4})?$/.test(p));
                const mainParts = filtered.slice(0, 3);
                if (zip && !mainParts.includes(zip)) {
                    return `${mainParts.join(', ')} ${zip}`;
                }
                return mainParts.join(', ');
            };

            return (
                <div className="min-h-screen flex flex-col bg-[#fcfcfd]">
                    <header className="bg-white border-b border-slate-100 py-6 px-4 md:px-10 no-print">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-6">
                                <div className="w-12 h-12 maroon-gradient rounded-xl flex items-center justify-center text-white font-black text-xl shadow-xl shadow-red-900/20 shrink-0">S</div>
                                <div>
                                    <h1 className="text-lg md:text-xl font-black text-[#800000] tracking-tighter uppercase leading-none">Scarsdale Schools</h1>
                                    <p className="text-[8px] md:text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em] mt-1">Business Office • Mileage Calculator</p>
                                </div>
                            </div>
                            <div className="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 flex items-center gap-4">
                                <div className="text-right">
                                    <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">IRS 2026 Rate</p>
                                    <p className="text-lg font-black text-slate-800">${IRS_RATE_2026}<span class="text-xs ml-1 text-slate-400">/mi</span></p>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto w-full px-4 md:px-10 py-8 flex-1">
                        <section className="no-print mb-12">
                            <div className="bg-white rounded-[2rem] p-6 md:p-8 card-shadow border border-slate-50">
                                <form onSubmit={calculateDistance} className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-400 mb-2 block tracking-widest ml-1">Home Origin</label>
                                            <input type="text" value={form.home} onChange={e => setForm({...form, home: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg font-bold text-sm outline-none focus:ring-2 ring-red-800/20 border border-transparent focus:bg-white transition-all" placeholder="Home address..." />
                                        </div>
                                        <div>
                                            <label className="text-[9px] font-black uppercase text-slate-400 mb-2 block tracking-widest ml-1">School Origin</label>
                                            <select value={form.schoolIdx} onChange={e => setForm({...form, schoolIdx: e.target.value})} className="w-full bg-slate-50 p-3 rounded-lg font-bold text-sm outline-none focus:ring-2 ring-red-800/20 border border-transparent focus:bg-white transition-all appearance-none cursor-pointer">
                                                <option value="">Select School...</option>
                                                {SCARSDALE_SCHOOLS.map((s, i) => <option key={i} value={i}>{s.name}</option>)}

                                            <label className="text-[9px] font-black uppercase text-slate-400 mb-2 block tracking-widest ml-1">Destination</label>

                                        </div>
                                    </div>

                                                        <span className="text-xs font-black uppercase tracking-wider text-slate-700">Outbound Stop</span>
                                                        <span className="text-[9px] text-slate-400 font-bold uppercase">(On the way there)</span>

                                                    <label className="relative inline-flex items-center cursor-pointer">

                                                    </label>

                                                {form.hasOutboundStop && (

                                                    </div>
                                                )}
                                            </div>

                                            {/* Return Stop Card */}
                                            <div className="bg-slate-50/50 p-4 rounded-2xl border border-slate-100 flex flex-col gap-4">
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-xs font-black uppercase tracking-wider text-slate-700">Return Stop</span>
                                                        <span className="text-[9px] text-slate-400 font-bold uppercase">(On the way back)</span>
                                                    </div>
                                                    <label className="relative inline-flex items-center cursor-pointer">
                                                        <input type="checkbox" checked={form.hasReturnStop} onChange={e => setForm({...form, hasReturnStop: e.target.checked})} className="sr-only peer" />
                                                        <div className="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-[#800000]"></div>
                                                    </label>
                                                </div>
                                                {form.hasReturnStop && (
                                                    <div className="animate-slide-up">
                                                        <input type="text" value={form.returnStop} onChange={e => setForm({...form, returnStop: e.target.value})} className="w-full bg-white p-3 rounded-lg font-bold text-sm outline-none border border-slate-200 focus:ring-2 ring-red-800/20 focus:border-transparent transition-all" placeholder="Return stop address..." />
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="flex justify-end border-t border-slate-100 pt-4">
                                            <button disabled={loading} className="maroon-gradient text-white h-[48px] px-12 rounded-lg font-black uppercase text-xs tracking-[0.2em] shadow-lg hover:scale-[1.01] active:scale-95 transition-all disabled:opacity-50 flex items-center justify-center">
                                                {loading ? (
                                                    <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                    </svg>
                                                ) : "CALCULATE"}
                                            </button>
                                        </div>
                                    </div>
                                </form>
                                {error && <p className="text-red-600 text-[10px] font-black uppercase mt-4 ml-1 bg-red-50 p-3 rounded-lg">{error}</p>}
                            </div>
                        </section>

                        {results && (
                            <div className="animate-slide-up">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b border-slate-200 pb-4 gap-4 no-print">
                                        <div>
                                            <h2 className="text-2xl md:text-3xl font-black text-slate-900 tracking-tighter uppercase italic leading-none">Mileage Calculation</h2>
                                            <p className="text-slate-400 font-bold uppercase text-[9px] mt-2 tracking-[0.4em]">{results.date}</p>
                                        </div>
                                        <button onClick={handlePrint} className="bg-slate-900 text-white px-8 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest flex items-center gap-3 hover:bg-[#800000] transition-all shadow-lg shrink-0 w-full md:w-auto justify-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                                            Print Result
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {/* Home Origin Card */}
                                    <div className="flex flex-col h-[700px] md:h-[900px] group">
                                        <div className={`bg-white rounded-2xl overflow-hidden card-shadow flex flex-col h-full border-2 ${isHomeLesser ? 'border-green-500/30 ring-4 ring-green-500/5' : 'border-slate-100'}`}>
                                            <div className="p-4 flex-shrink-0 relative">
                                                {isHomeLesser && (
                                                    <div className="absolute top-0 right-4 bg-green-500 text-white text-[8px] font-black uppercase tracking-widest py-1 px-3 rounded-b-lg shadow-sm">
                                                        Lowest Cost
                                                    </div>
                                                )}
                                                <div className="flex justify-between items-center mb-2 mt-1">
                                                    <h3 className={`text-lg md:text-xl font-black uppercase tracking-tight ${isHomeLesser ? 'text-green-700' : 'text-slate-800'}`}>Home Origin</h3>
                                                    <div className="text-right flex items-baseline gap-2">
                                                        <div className="flex flex-col items-end">
                                                            <span className={`text-3xl md:text-4xl font-black tracking-tighter ${isHomeLesser ? 'text-green-700' : 'text-slate-900'}`}>${finalHomeTotal.toFixed(2)}</span>
                                                            {override.active && override.miles !== '' && (
                                                                <span className="text-[7px] font-black uppercase bg-red-100 text-red-800 px-1.5 py-0.5 rounded tracking-wider mt-1">Manual Adjustment</span>
                                                            )}
                                                        </div>
                                                        <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{finalHomeMiles.toFixed(2)} mi</span>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4 pt-2 border-t border-slate-100 text-[9px] leading-tight">
                                                    {/* Left Column: Outbound */}
                                                    <div className="space-y-1.5 border-r border-slate-100 pr-2">
                                                        <p className="font-black uppercase tracking-wider text-[#800000] text-[8px] mb-1">Outbound Journey</p>
                                                        
                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.home.address}>{results.home.address}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.home.resolvedAddress)}</span>
                                                            </div>
                                                        </div>

                                                        {results.hasOutboundStop && (
                                                            <div className="flex items-start gap-1">
                                                                <span className="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                                <div className="flex-grow min-w-0">
                                                                    <span className="text-slate-700 font-semibold truncate block" title={results.outboundStop}>{results.outboundStop}</span>
                                                                    <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.outboundResolvedAddress)}</span>
                                                                </div>
                                                            </div>
                                                        )}

                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.dest}>{results.dest}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.destResolvedAddress)}</span>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Right Column: Return */}
                                                    <div className="space-y-1.5 pl-2">
                                                        <p className="font-black uppercase tracking-wider text-[#800000] text-[8px] mb-1">Return Journey</p>

                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.dest}>{results.dest}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.destResolvedAddress)}</span>
                                                            </div>
                                                        </div>

                                                        {results.hasReturnStop && (
                                                            <div className="flex items-start gap-1">
                                                                <span className="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                                <div className="flex-grow min-w-0">
                                                                    <span className="text-slate-700 font-semibold truncate block" title={results.returnStop}>{results.returnStop}</span>
                                                                    <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.returnResolvedAddress)}</span>
                                                                </div>
                                                            </div>
                                                        )}

                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.home.address}>{results.home.address}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.home.resolvedAddress)}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                            </div>
                                            <div className="flex-1 bg-slate-100 map-container relative">
                                                <iframe width="100%" height="100%" frameBorder="0" src={results.home.map} className="absolute inset-0"></iframe>
                                            </div>
                                        </div>
                                    </div>

                                    {/* School Origin Card */}
                                    <div className="flex flex-col h-[700px] md:h-[900px] group">
                                        <div className={`bg-white rounded-2xl overflow-hidden card-shadow flex flex-col h-full border-2 ${isSchoolLesser ? 'border-green-500/30 ring-4 ring-green-500/5' : 'border-slate-100'}`}>
                                            <div className="p-4 flex-shrink-0 relative">
                                                {isSchoolLesser && (
                                                    <div className="absolute top-0 right-4 bg-green-500 text-white text-[8px] font-black uppercase tracking-widest py-1 px-3 rounded-b-lg shadow-sm">
                                                        Lowest Cost
                                                    </div>
                                                )}
                                                <div className="flex justify-between items-center mb-2 mt-1">
                                                    <h3 className={`text-lg md:text-xl font-black uppercase tracking-tight ${isSchoolLesser ? 'text-green-700' : 'text-slate-800'}`}>School Origin</h3>
                                                    <div className="text-right flex items-baseline gap-2">
                                                        <div className="flex flex-col items-end">
                                                            <span className={`text-3xl md:text-4xl font-black tracking-tighter ${isSchoolLesser ? 'text-green-700' : 'text-slate-900'}`}>${finalSchoolTotal.toFixed(2)}</span>
                                                            {override.active && override.miles !== '' && (
                                                                <span className="text-[7px] font-black uppercase bg-red-100 text-red-800 px-1.5 py-0.5 rounded tracking-wider mt-1">Manual Adjustment</span>
                                                            )}
                                                        </div>
                                                        <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{finalSchoolMiles.toFixed(2)} mi</span>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4 pt-2 border-t border-slate-100 text-[9px] leading-tight">
                                                    {/* Left Column: Outbound */}
                                                    <div className="space-y-1.5 border-r border-slate-100 pr-2">
                                                        <p className="font-black uppercase tracking-wider text-[#800000] text-[8px] mb-1">Outbound Journey</p>
                                                        
                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.school.name}>{results.school.name}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.school.resolvedAddress)}</span>
                                                            </div>
                                                        </div>

                                                        {results.hasOutboundStop && (
                                                            <div className="flex items-start gap-1">
                                                                <span className="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                                <div className="flex-grow min-w-0">
                                                                    <span className="text-slate-700 font-semibold truncate block" title={results.outboundStop}>{results.outboundStop}</span>
                                                                    <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.outboundResolvedAddress)}</span>
                                                                </div>
                                                            </div>
                                                        )}

                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.dest}>{results.dest}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.destResolvedAddress)}</span>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* Right Column: Return */}
                                                    <div className="space-y-1.5 pl-2">
                                                        <p className="font-black uppercase tracking-wider text-[#800000] text-[8px] mb-1">Return Journey</p>

                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">FROM:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.dest}>{results.dest}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.destResolvedAddress)}</span>
                                                            </div>
                                                        </div>

                                                        {results.hasReturnStop && (
                                                            <div className="flex items-start gap-1">
                                                                <span className="text-red-500 font-bold uppercase w-8 flex-shrink-0">STOP (➔):</span>
                                                                <div className="flex-grow min-w-0">
                                                                    <span className="text-slate-700 font-semibold truncate block" title={results.returnStop}>{results.returnStop}</span>
                                                                    <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.returnResolvedAddress)}</span>
                                                                </div>
                                                            </div>
                                                        )}

                                                        <div className="flex items-start gap-1">
                                                            <span className="text-slate-400 font-bold uppercase w-8 flex-shrink-0">TO:</span>
                                                            <div className="flex-grow min-w-0">
                                                                <span className="text-slate-700 font-semibold truncate block" title={results.school.name}>{results.school.name}</span>
                                                                <span className="text-slate-400 font-medium italic block text-[7.5px] leading-none mt-0.5">{shortenAddress(results.school.resolvedAddress)}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                            </div>
                                            <div className="flex-1 bg-slate-100 map-container relative">
                                                <iframe width="100%" height="100%" frameBorder="0" src={results.school.map} className="absolute inset-0"></iframe>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Manual Override Control Box */}
                                <div className="mt-6 p-4 bg-white rounded-2xl border border-slate-100 card-shadow no-print">
                                    <button 
                                        onClick={() => setOverride({ ...override, active: !override.active })} 
                                        className="text-[9px] font-black uppercase tracking-wider text-[#800000] hover:text-[#4a0000] flex items-center gap-1.5 transition-all outline-none"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                            <polygon points="16 3 21 8 8 21 3 21 3 16 16 3"></polygon>
                                        </svg>
                                        {override.active ? "Use Map Mileage" : "Adjust Mileage Manually"}
                                    </button>
                                    
                                    {override.active && (
                                        <div className="mt-3 grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-red-50/30 rounded-xl border border-red-100/50 animate-slide-up">
                                            <div>
                                                <label className="text-[8px] font-black uppercase text-red-800 tracking-wider mb-1 block">Actual Driven Miles</label>
                                                <input 
                                                    type="number" 
                                                    step="0.01" 
                                                    value={override.miles} 
                                                    onChange={e => setOverride({ ...override, miles: e.target.value })} 
                                                    className="w-full bg-white p-2 rounded border border-red-100 text-xs font-bold focus:outline-none focus:ring-2 ring-red-800/10 text-slate-800" 
                                                    placeholder="Enter actual miles..." 
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[8px] font-black uppercase text-red-800 tracking-wider mb-1 block">Justification for Detour</label>
                                                <input 
                                                    type="text" 
                                                    value={override.reason} 
                                                    onChange={e => setOverride({ ...override, reason: e.target.value })} 
                                                    className="w-full bg-white p-2 rounded border border-red-100 text-xs font-semibold focus:outline-none focus:ring-2 ring-red-800/10 text-slate-800" 
                                                    placeholder="e.g., Road closure on Main St..." 
                                                />
                                            </div>
                                            <div className="flex flex-col justify-end text-right text-[9px] font-bold text-slate-400 space-y-1">
                                                <div>Original Home Map: <span className="text-slate-600">{results.home.miles} mi</span></div>
                                                <div>Original School Map: <span className="text-slate-600">{results.school.miles} mi</span></div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <div className="mt-4 md:mt-6 bg-[#1a1a1a] rounded-2xl p-4 md:p-6 text-white shadow-lg mb-4">
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className="w-1 h-5 bg-red-800"></div>
                                        <p className="text-xs md:text-sm font-black uppercase tracking-wider text-red-500">Mileage Reimbursement Policy</p>
                                    </div>
                                    <div className="grid grid-cols-1 gap-3 text-[11px] md:text-xs text-slate-300 leading-normal max-w-5xl">
                                        <p>
                                            Reimbursement is calculated on the <strong>lesser</strong> of roundtrips: Home-to-Destination vs. School-to-Destination. Standard IRS rates apply. Fuel receipts should not be submitted.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!results && !loading && (
                            <div className="h-[300px] md:h-[400px] rounded-[2rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center opacity-40 bg-slate-50/50">
                                <p className="font-black uppercase tracking-[0.3em] md:tracking-[0.5em] text-[10px] text-slate-400 text-center px-4">Enter trip details to begin</p>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center no-print border-t border-slate-100">
                        <p className="text-[8px] font-black text-slate-300 uppercase tracking-[0.6em]">Non Sibi • Scarsdale Union Free School District</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
